<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOP Mail - Disposable Email</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--accent:#6c5ce7;--accent2:#a29bfe;--text:#e0e0e0;--text2:#888;--green:#00b894;--red:#e17055;--yellow:#fdcb6e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700}
.logo span{color:var(--accent)}
.logo .icon{font-size:28px}
.container{max-width:900px;width:100%;margin:0 auto;padding:24px;flex:1}
.email-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.email-display{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.email-addr{font-size:22px;font-weight:600;color:var(--accent2);font-family:'Courier New',monospace;word-break:break-all;flex:1;min-width:200px}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--border);color:var(--text)}.btn-secondary:hover{background:#2a2a3e}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.85}
.btn-small{padding:6px 14px;font-size:12px}
.controls{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center}
.controls label{color:var(--text2);font-size:13px}
.controls select,.controls input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px}
.controls input[type=text]{width:180px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.mail-list{display:flex;flex-direction:column;gap:10px}
.mail-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s}
.mail-item:hover{border-color:var(--accent);transform:translateY(-1px)}
.mail-item.unread{border-left:3px solid var(--accent)}
.mail-from{font-weight:600;color:var(--accent2);font-size:14px;margin-bottom:4px}
.mail-subject{font-size:15px;margin-bottom:4px}
.mail-preview{color:var(--text2);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-time{color:var(--text2);font-size:12px;margin-top:6px}
.mail-detail{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;display:none}
.mail-detail.active{display:block}
.mail-detail h2{font-size:18px;margin-bottom:8px}
.mail-detail .meta{color:var(--text2);font-size:13px;margin-bottom:16px;line-height:1.8}
.mail-detail .body{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:500px;overflow-y:auto}
.mail-detail .body iframe{width:100%;min-height:400px;border:none;background:#fff;border-radius:4px}
.back-btn{margin-bottom:16px}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:12px}
.status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.status .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.badge{background:var(--accent);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.refresh-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.timer{color:var(--text2);font-size:13px}
@media(max-width:600px){.email-addr{font-size:16px}.container{padding:16px}.email-display{flex-direction:column;align-items:stretch}.email-display .btn{width:100%;justify-content:center}}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="icon">📧</span> <span>LOP</span> Mail</div>
  <div class="status"><div class="dot"></div> <span id="statusText">Auto-refresh active</span></div>
</div>

<div class="container" id="mainView">
  <div class="email-bar">
    <div class="email-display">
      <div class="email-addr" id="currentEmail">Loading...</div>
      <button class="btn btn-primary" onclick="copyEmail()">📋 Copy</button>
      <button class="btn btn-green" onclick="newAddress()">🔄 New Address</button>
    </div>
    <div class="controls">
      <label>Custom name:</label>
      <input type="text" id="customName" placeholder="random" maxlength="30">
      <label>Refresh:</label>
      <select id="refreshInterval" onchange="setRefresh()">
        <option value="5">5s</option>
        <option value="10" selected>10s</option>
        <option value="30">30s</option>
        <option value="0">Off</option>
      </select>
      <button class="btn btn-secondary btn-small" onclick="loadMails()">🔃 Refresh Now</button>
    </div>
  </div>

  <div class="refresh-bar">
    <span id="mailCount" class="badge">0 messages</span>
    <span class="timer" id="nextRefresh">Next refresh in 10s</span>
  </div>

  <div class="mail-list" id="mailList">
    <div class="empty"><div class="icon">📭</div><div>No emails yet</div><div style="margin-top:8px;font-size:13px">Use the address above to receive emails</div></div>
  </div>
</div>

<div class="container" id="detailView" style="display:none">
  <button class="btn btn-secondary back-btn" onclick="closeDetail()">← Back to Inbox</button>
  <div class="mail-detail active" id="mailDetail"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://temp-email.jodixone2.workers.dev';
let currentAddr = '';
let currentToken = '';
let mails = [];
let refreshTimer = null;
let countdownTimer = null;
let countdown = 10;

// Init
(async function init() {
  const saved = localStorage.getItem('lop_mail');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      if (d.address && d.token) {
        currentAddr = d.address;
        currentToken = d.token;
        document.getElementById('currentEmail').textContent = currentAddr;
        loadMails();
        startCountdown();
        return;
      }
    } catch(e) {}
  }
  await newAddress();
})();

async function newAddress() {
  const custom = document.getElementById('customName').value.trim();
  const body = { domain: 'lop.my.id' };
  if (custom) body.name = custom.replace(/[^a-zA-Z0-9._-]/g, '');
  
  try {
    const res = await fetch(API + '/api/new_address', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.address && data.jwt) {
      currentAddr = data.address;
      currentToken = data.jwt;
      localStorage.setItem('lop_mail', JSON.stringify({ address: currentAddr, token: currentToken }));
      document.getElementById('currentEmail').textContent = currentAddr;
      mails = [];
      renderMails();
      loadMails();
      startCountdown();
      showToast('✅ New address created!');
    } else {
      showToast('❌ Failed: ' + (data.error || 'unknown'));
    }
  } catch(e) {
    showToast('❌ Network error');
  }
}

async function loadMails() {
  if (!currentToken) return;
  try {
    const res = await fetch(API + '/api/mails', {
      headers: { 'Authorization': 'Bearer ' + currentToken }
    });
    const data = await res.json();
    mails = (data['hydra:member'] || []).reverse();
    renderMails();
  } catch(e) {}
}

function renderMails() {
  const list = document.getElementById('mailList');
  const count = document.getElementById('mailCount');
  count.textContent = mails.length + ' message' + (mails.length !== 1 ? 's' : '');
  
  if (mails.length === 0) {
    list.innerHTML = '<div class="empty"><div class="icon">📭</div><div>No emails yet</div><div style="margin-top:8px;font-size:13px">Use the address above to receive emails</div></div>';
    return;
  }
  
  list.innerHTML = mails.map((m, i) => {
    const t = m.createdAt ? timeAgo(m.createdAt) : '';
    return '<div class="mail-item unread" onclick="openMail(' + i + ')">' +
      '<div class="mail-from">' + esc(m.from || 'unknown') + '</div>' +
      '<div class="mail-subject">' + esc(m.subject || '(no subject)') + '</div>' +
      '<div class="mail-preview">' + esc((m.text || '').substring(0, 120)) + '</div>' +
      '<div class="mail-time">' + t + '</div>' +
      '</div>';
  }).join('');
}

async function openMail(idx) {
  const m = mails[idx];
  if (!m) return;
  
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  
  let bodyHtml = '';
  if (m.html && m.html.length > 0 && m.html[0]) {
    bodyHtml = '<iframe id="mailFrame" sandbox="allow-same-origin" onload="resizeFrame(this)"></iframe>';
  } else {
    bodyHtml = '<div class="body">' + esc(m.text || '(empty)') + '</div>';
  }
  
  document.getElementById('mailDetail').innerHTML =
    '<h2>' + esc(m.subject || '(no subject)') + '</h2>' +
    '<div class="meta">' +
      '<div><strong>From:</strong> ' + esc(m.from || 'unknown') + '</div>' +
      '<div><strong>To:</strong> ' + esc(m.to?.[0]?.address || currentAddr) + '</div>' +
      '<div><strong>Date:</strong> ' + (m.createdAt ? new Date(m.createdAt).toLocaleString() : 'unknown') + '</div>' +
    '</div>' +
    bodyHtml;
  
  if (m.html && m.html.length > 0 && m.html[0]) {
    setTimeout(() => {
      const frame = document.getElementById('mailFrame');
      if (frame) {
        const doc = frame.contentDocument || frame.contentWindow.document;
        doc.open();
        doc.write(m.html[0]);
        doc.close();
      }
    }, 50);
  }
}

function resizeFrame(f) {
  try {
    f.style.height = Math.max(300, f.contentDocument.body.scrollHeight + 20) + 'px';
  } catch(e) { f.style.height = '400px'; }
}

function closeDetail() {
  document.getElementById('mainView').style.display = 'block';
  document.getElementById('detailView').style.display = 'none';
}

function copyEmail() {
  navigator.clipboard.writeText(currentAddr).then(() => showToast('📋 Copied!'));
}

function setRefresh() {
  const v = parseInt(document.getElementById('refreshInterval').value);
  countdown = v || 10;
  clearInterval(refreshTimer);
  clearInterval(countdownTimer);
  if (v > 0) {
    refreshTimer = setInterval(() => { loadMails(); countdown = v; }, v * 1000);
    countdownTimer = setInterval(() => {
      countdown--;
      if (countdown < 0) countdown = v;
      document.getElementById('nextRefresh').textContent = 'Next refresh in ' + countdown + 's';
    }, 1000);
    document.getElementById('statusText').textContent = 'Auto-refresh every ' + v + 's';
  } else {
    document.getElementById('nextRefresh').textContent = 'Auto-refresh off';
    document.getElementById('statusText').textContent = 'Auto-refresh disabled';
  }
}

function startCountdown() {
  const v = parseInt(document.getElementById('refreshInterval').value);
  countdown = v || 10;
  clearInterval(refreshTimer);
  clearInterval(countdownTimer);
  if (v > 0) {
    refreshTimer = setInterval(() => { loadMails(); countdown = v; }, v * 1000);
    countdownTimer = setInterval(() => {
      countdown--;
      if (countdown < 0) countdown = v;
      document.getElementById('nextRefresh').textContent = 'Next refresh in ' + countdown + 's';
    }, 1000);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
</script>
</body>
</html>
